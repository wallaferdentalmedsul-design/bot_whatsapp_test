<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protótipo WhatsApp - Reativação de Clientes</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0b141a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .phone-frame {
      width: 420px;
      max-width: 100%;
      height: 860px;
      background: #111b21;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      border: 8px solid #1f2c34;
      position: relative;
    }

    .status-bar {
      height: 28px;
      background: #202c33;
      color: #e9edef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 12px;
    }

    .header {
      background: #202c33;
      color: #e9edef;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .icon-btn {
      color: #e9edef;
      font-size: 18px;
      user-select: none;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #8696a0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #111b21;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-status {
      font-size: 12px;
      color: #8696a0;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
    }

    .chat-area {
      height: calc(100% - 28px - 62px - 72px);
      overflow-y: auto;
      padding: 16px 12px 20px;
      background-color: #0b141a;
      background-image:
        linear-gradient(rgba(17, 27, 33, 0.84), rgba(17, 27, 33, 0.84)),
        radial-gradient(circle at 25px 25px, rgba(255,255,255,0.03) 2px, transparent 0),
        radial-gradient(circle at 75px 75px, rgba(255,255,255,0.025) 2px, transparent 0);
      background-size: auto, 100px 100px, 100px 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .encryption-banner {
      align-self: center;
      background: #182229;
      color: #ffd279;
      font-size: 12px;
      line-height: 1.4;
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 92%;
      text-align: center;
      box-shadow: 0 1px 0 rgba(0,0,0,0.18);
      margin-bottom: 12px;
    }

    .date-divider {
      align-self: center;
      background: #1f2c34;
      color: #cfd7dc;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .msg-row {
      display: flex;
      width: 100%;
      flex-direction: column;
    }

    .msg-row.bot {
      align-items: flex-start;
    }

    .msg-row.user {
      align-items: flex-end;
    }

    .message {
      position: relative;
      max-width: 82%;
      padding: 8px 10px 18px 10px;
      border-radius: 8px;
      color: #e9edef;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 1px 0 rgba(0,0,0,0.18);
    }

    .message.bot {
      background: #202c33;
      border-top-left-radius: 0;
    }

    .message.user {
      background: #005c4b;
      border-top-right-radius: 0;
    }

    .meta {
      position: absolute;
      right: 8px;
      bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(233, 237, 239, 0.72);
    }

    .ticks {
      font-size: 11px;
      letter-spacing: -1px;
    }

    .reply-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      max-width: 82%;
    }

    .chip {
      border: 1px solid #2a3942;
      background: transparent;
      color: #53bdeb;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s ease;
    }

    .chip:hover {
      background: rgba(83, 189, 235, 0.08);
      border-color: #53bdeb;
    }

    .composer {
      height: 72px;
      background: #111b21;
      padding: 10px 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .composer-side {
      width: 36px;
      text-align: center;
      color: #8696a0;
      font-size: 22px;
      user-select: none;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: #202c33;
      border-radius: 10px;
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      color: #8696a0;
    }

    .placeholder {
      flex: 1;
      font-size: 15px;
      color: #8696a0;
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .phone-frame {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>12:00</span>
      <span>📶 Wi-Fi 🔋 87%</span>
    </div>

    <div class="header">
      <div class="icon-btn">←</div>
      <div class="avatar">D</div>
      <div class="header-info">
        <div class="header-name">DentalMed Reativação</div>
        <div class="header-status">online</div>
      </div>
      <div class="header-actions">
        <span>📹</span>
        <span>📞</span>
        <span>⋮</span>
      </div>
    </div>

    <div class="chat-area" id="chatBox">
      <div class="encryption-banner">As mensagens e chamadas são protegidas com a criptografia de ponta a ponta.</div>
      <div class="date-divider">HOJE</div>
    </div>

    <div class="composer">
      <div class="composer-side">😊</div>
      <div class="input-wrap">
        <span>📎</span>
        <div class="placeholder">Mensagem</div>
        <span>📷</span>
      </div>
      <div class="composer-side">🎤</div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, sender = 'bot', showTicks = false) {
      const row = document.createElement('div');
      row.className = `msg-row ${sender}`;

      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.innerHTML = `${text}<div class="meta"><span>${getTime()}</span>${showTicks ? '<span class="ticks">✓✓</span>' : ''}</div>`;

      row.appendChild(msg);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;

      return row;
    }

    function addChips(parentRow, options) {
      const chipsWrap = document.createElement('div');
      chipsWrap.className = 'reply-chips';

      options.forEach(option => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = option.label;
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(btn => btn.disabled = true);
          option.action();
        };
        chipsWrap.appendChild(chip);
      });

      parentRow.appendChild(chipsWrap);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function botTyping(callback) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typingRow';

      const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.style.paddingBottom = '8px';
      msg.innerHTML = '<span style="opacity:.8">digitando...</span>';
      row.appendChild(msg);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;

      setTimeout(() => {
        row.remove();
        callback();
      }, 700);
    }

    function startChat() {
      botTyping(() => {
        const row = addMessage('Olá, Dr(a). Tudo bem? Aqui é da DentalMed. Notamos que faz um tempo desde sua última compra com a gente e gostaríamos de saber se você ainda tem interesse em receber atendimento sobre materiais odontológicos.');
        addChips(row, [
          { label: 'Tenho interesse', action: interestedFlow },
          { label: 'Não tenho interesse', action: noInterestFlow }
        ]);
      });
    }

    function interestedFlow() {
      addMessage('Tenho interesse', 'user', true);

      botTyping(() => {
        addMessage('Perfeito. Vou encaminhar seu interesse para um de nossos consultores, que fará contato com você em breve.');
        botTyping(() => {
          const row = addMessage('Status do atendimento: cliente qualificado e encaminhado ao vendedor.');
          addChips(row, [
            { label: 'Reiniciar demonstração', action: restartChat }
          ]);
        });
      });
    }

    function noInterestFlow() {
      addMessage('Não tenho interesse', 'user', true);

      botTyping(() => {
        const row = addMessage('Tudo certo. Para nos ajudar a melhorar nosso atendimento, você poderia informar o principal motivo?');
        addChips(row, [
          { label: 'Preço', action: () => finalReason('Preço') },
          { label: 'Concorrência', action: () => finalReason('Concorrência') },
          { label: 'Sem demanda', action: () => finalReason('Sem demanda') },
          { label: 'Atendimento anterior', action: () => finalReason('Atendimento anterior') },
          { label: 'Outro', action: () => finalReason('Outro') }
        ]);
      });
    }

    function finalReason(reason) {
      addMessage(reason, 'user', true);

      botTyping(() => {
        addMessage(`Obrigado pelo retorno. Motivo registrado: ${reason}.`);
        botTyping(() => {
          const row = addMessage('Status do atendimento: cliente sem interesse no momento. Informação salva para análise comercial.');
          addChips(row, [
            { label: 'Reiniciar demonstração', action: restartChat }
          ]);
        });
      });
    }

    function restartChat() {
      chatBox.innerHTML = `
        <div class="encryption-banner">As mensagens e chamadas são protegidas com a criptografia de ponta a ponta.</div>
        <div class="date-divider">HOJE</div>
      `;
      startChat();
    }

    startChat();
  </script>
</body>
</html>
